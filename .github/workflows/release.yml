name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for keyless cosign signing via GitHub OIDC
      attestations: write  # required for SLSA provenance attestation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad  # v4.0.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign release artifacts
        env:
          COSIGN_YES: "true"
        run: |
          for artifact in dist/*.tar.gz dist/*.zip dist/checksums.txt; do
            cosign sign-blob --bundle="${artifact}.bundle" --new-bundle-format=false "${artifact}"
            jq -r '.base64Signature' "${artifact}.bundle" > "${artifact}.sig"
          done

      - name: Upload signatures to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          find dist -name "*.sig" -exec gh release upload "${tag}" {} --clobber \;

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v3.2.0
        with:
          subject-path: dist/*.tar.gz, dist/*.zip, dist/checksums.txt
